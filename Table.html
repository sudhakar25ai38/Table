<!DOCTYPE html>
<html>
<head>
    <title>Simple Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        table {
            width: 60%;
            margin: 40px auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        caption {
            font-size: 20px;
            margin: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<table>
    <caption>Student Information</caption>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Grade</th>
    </tr>
    <tr>
        <td>101</td>
        <td>John</td>
        <td>16</td>
        <td>A</td>
    </tr>
    <tr>
        <td>102</td>
        <td>Emma</td>
        <td>15</td>
        <td>B</td>
    </tr>
    <tr>
        <td>103</td>
        <td>Michael</td>
        <td>17</td>
        <td>A</td>
    </tr>
</table>

</body>
</html>
